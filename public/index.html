<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圖片壓縮串接測試</title>
  </head>
  <body>
    <h2>🚀 圖片壓縮與轉檔 — 前端串接實驗室</h2>

    <!-- 1. 表單區：注意！我們移除了傳統的 action，改用 id 讓 JavaScript 來接管 -->
    <form id="uploadForm">
      <label>選擇圖片：</label>
      <input type="file" id="imageInput" required /><br /><br />

      <label>輸入品質 (1-100)：</label>
      <input type="number" id="qualityInput" value="85" required /><br /><br />

      <button type="submit">開始壓縮圖片</button>
    </form>

    <hr />

    <!-- 2. 【新增】前台結果區：原本是隱藏的，等後端成功回傳後，用 JS 把資料塞進這裡 -->
    <div id="resultArea" style="display: none">
      <h3>🎉 處理完成！</h3>
      <p>原始大小：<span id="origSize">0</span> bytes</p>
      <p>壓縮後大小：<span id="outSize">0</span> bytes</p>
      <p>節省比例：<span id="savedPercent">0</span> %</p>
      <a id="downloadLink" href="#" download>📥 點我下載 WebP 圖片</a>
    </div>

    <!-- 3. 【新增】錯誤提示區：當後端噴 errorCode 時，顯示在這裡 -->
    <div id="errorArea" style="display: none; color: red">
      <h3>❌ 發生錯誤！</h3>
      <p id="errorMessage"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
