<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚡ ImageCompress - 高效圖片壓縮工坊</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <!-- 引入 Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h2>⚡ ImageCompress</h2>
      <div class="subtitle">ImageCompress - 高效圖片壓縮工坊</div>

      <form id="uploadForm">
        <div class="form-group">
          <label for="imageInput">1. 選擇要壓縮的圖片</label>
          <input
            type="file"
            id="imageInput"
            accept="image/jpeg,image/png,image/webp"
            multiple
            required
          />
        </div>

        <div class="form-group">
          <label for="qualityInput">2. 設定壓縮品質</label>
          <input type="range" id="qualityInput" min="1" max="100" value="80" />
          <div class="quality-display">
            <span>品質等級：</span>
            <span class="quality-value" id="qualityValue">80</span>
          </div>
        </div>

        <button type="submit" id="submitBtn">開始壓縮圖片</button>
      </form>

      <div id="resultArea" class="hidden-section">
        <hr />
        <div class="result-card">
          <div class="result-header">
            <h3>🎉 壓縮完成</h3>
            <div class="result-badge">Ready to download</div>
          </div>

          <div class="result-hero">
            <div class="hero-score">
              <span class="hero-score-value" id="savedPercent">0</span>
              <span class="hero-score-label">SAVED</span>
            </div>
          </div>

          <div class="metric-grid">
            <div class="metric-card">
              <span class="metric-label">原始大小</span>
              <span class="metric-value" id="origSize">0 bytes</span>
              <span class="metric-note">上傳前檔案容量</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">處理後大小</span>
              <span class="metric-value" id="outSize">0 bytes</span>
              <span class="metric-note">壓縮後輸出容量</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">輸出格式</span>
              <span class="metric-value">WebP</span>
              <span class="metric-note">適合網頁傳輸</span>
            </div>
          </div>

          <div id="previewArea" class="preview-panel hidden-section">
            <img
              id="previewImage"
              class="preview-image"
              src=""
              alt="壓縮後 WebP 預覽"
              loading="lazy"
            />
          </div>

          <a id="downloadLink" class="download-btn" href="#" download
            >📥 立即下載 WebP 檔案</a
          >
        </div>
      </div>

      <div id="errorArea" class="hidden-section">
        <hr />
        <div class="error-card">
          <strong>❌ 觸發後端攔截機制：</strong>
          <p id="errorMessage" class="error-message"></p>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="feedbackModal"
      tabindex="-1"
      aria-labelledby="feedbackModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="feedbackModalLabel">系統訊息</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body" id="feedbackModalBody"></div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              我知道了
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="main.js"></script>
  </body>
</html>
